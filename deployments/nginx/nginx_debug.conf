# $host : IP ou nom du serveur mis dans la barre du navigateur (ex: @IP_Ubuntu)
# $remote_addr : IP publique de la machine (ici mon PC)
# $proxy_add_x_forwarded_for : liste de toutes les adresses IP
# par lesquelles sont passées les requêtes 
# proxy_redirect off : nginx ne touche pas au redirections (gérées par l'appli)
# NB: proxy_set_header Host localhost: localhost remplacé par $host pour config dynamique 
# listen 80 default_server; utilse si plusieurs server {...}
# server_name _; Accepeter n'importe quelle IP/Nom utile si le server_name dans le http est inconnu

# ----- IMPORTANT ----
# NB: NE JAMAIS UTILISER UN IF DANS LOCATION CAR IMPORTANT EFFETS DE BORD SUR
# LE COMPORTEMENT DU LOCATION MEME SI ON N'ENTRE PAS DANS LE IF

events {
    worker_connections 1024; # Nombre maximum de connexions par processus
}


http {
    # Le navigateur reconnaît et affiche correctement le CSS et le JavaScript de MLflow.
    # Même si déjà présent dans l'image de base, PAR PRINCIPE, il est préférable de les
    # rajouter pour garantir l'autonomie de la configuration et éviter les erreurs
    # d'affichage si on change d'image Nginx qui ne les contient plus.
    include       /etc/nginx/mime.types;
    # Et si Nginx ne trouve pas l'extension dans mimes.type alors default
    default_type  application/octet-stream;

    # Log d'accès : pour voir CHAQUE requête qui arrive
    # access_log /var/log/nginx/access.log;
    # Log d'erreur : avec le niveau 'debug' pour voir le cheminement interne
    # error_log  /var/log/nginx/error.log debug;

    # On configure la mémoire pour stocker les adresses IPs
    # et on fixe la règle de base (10 requêtes max/s par IP)
    limit_req_zone $binary_remote_addr zone=apilimit:10m rate=10r/s;

    # --- FACTORISATION ICI (Niveau HTTP ou Server) ---
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # En interne, tous les échanges se passent en HTTP
    # Nginx informe le service du mode externe utilisé $scheme= HTTP ou HTTPS;
    # Par mode externe, on parle de http(s)://@IP/... pour accéder au service
    # Ainsi le service conerné sera quoi utilisé en externe (ex: bouton, ...)
    # NB: Ici, Server configuré en mode HTTP, donc la commande est inutile.
    # Mais comme elle ne nuit pas, on la garde pour des raisons d'homogénéïté
    proxy_set_header X-Forwarded-Proto $scheme;  

    # BLOC PRINCIPAL (Port 80)
    server {

        listen 80;

        # Redirection vers l'interface MLflow
        location = /mlflow {
            # Le code 301 indique une redirection permanente vers la version avec slash.
            # Donc en mettant /mlflow à la fin, redirection automatique /mlflow/
            return 301 $scheme://$http_host$request_uri/;
        }

        location /mlflow/ {
            # On autorise jusqu'à 1 (la normale) + 50 (le burst) requêtes simultannées
            # Mais comme le rythme est de 10r/s, il mettra 5.1s pour se vider
            # Si le burst commence à se vider, on peut recevoir de nouvelles requêtes mais
            # sans dépasser les 51;
            # nodelay pour dire que c'est transmit immédiatement
            # 50 pour gérer le cas de API replicas élevés
            # Actuellement replicas: 1 donc inutile mais présent juste pour info.formation
            limit_req zone=apilimit burst=50 nodelay;

            # MLFLOW_TRACKING_URI est défini dans docker-compose nginx environnement
            # proxy_pass http://mlflow_server:5000/;
            proxy_pass ${MLFLOW_TRACKING_URI}/;
        }

        location = /api {
            # Le code 301 indique une redirection permanente vers la version avec slash.
            return 301 $scheme://$http_host$request_uri/;
        }

        location /api/ {
            # Même explication que pour/mlflow/
            limit_req zone=apilimit burst=20 nodelay;
            # Grâce à root_path="/api" mis dans le fastapi ./src/api/main.py, toutes les
            # commandes du navigateur fastapi se terminennt par /api/xxx..
            # Or comme la commande ci-dessous se termine par /, nginx va automatiquement
            # remplacer /api/ par / suivi de la partie restante xxx..
            # ex: IP/api/docs devient http://prediction_api:8000/docs
            # qui est alors envoyé au fastapi. Cela simplifie le nginx, donc plus lisible
            # MAIS SURTOUT, si le fastapi evolue avec d'autres commandes autres que
            # predict ou docs, elles sont prises en compte ici sans rien modifier
            proxy_pass http://prediction_api:8000/;
        }

        location = /airflow {
            return 301 $scheme://$http_host$request_uri/;
        }

        location /airflow/ {
            # On limite le débit pour Airflow
            # Pour le login, l'admin et les interactions avec les DAGs
            limit_req zone=apilimit burst=20 nodelay;

            # Spécifique à airflow derrière le reverse proxy pour utiliser l'adresse web http://IP/airflow
            # et non pas http://airflow-webserver:8080/airflow
            proxy_set_header Host $http_host;
            # Transmet l'identité à chaque requête pour corriger les lines internes
            # Cohérent avec le AIRFLOW__WEBSERVER__BASE_URL du docker-compose.yml
            #proxy_set_header X-Script-Name /airflow; Donc c'est un doublon et inutile

            #proxy_set_header X-Forwarded-Host $http_host;
            #proxy_set_header X-Forwarded-Port $server_port;

            # On injecte un header pour PROUVER que le build a marché. Juste util au debug
            # add_header X-Nginx-Status "Config-Updated-2026";

            # --- SUPPORT TEMPS RÉEL (WebSockets) ---
            # Upgrade et Connection nécessaires pour voir l'état
            # des tâches (ex: rouge -> vert) sans rafraîchir la page.
            # Le protocole WebSocket exige HTTP 1.1 et l'en-tête Upgrade.
            # NB: par défaut, Nginx est en HTTP 1.0
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Nom du service défini dans docker-compose
            # Sans le / à la fin car toutes les commandes passent par /airflow/
            # définis dans le airflow common du docker_compose.yml
            # L'ORDRE COMPTE. D'ABORD FAIRE LES _set_header et _http_version
            proxy_pass http://airflow-webserver:8080;

            # --- LIMITE ÉLARGIE (Statiques) ---
            # Après la 1ère init ou après un clear du cache du browser, lorsqu'on relance le
            # Airflow Web, le browser va demander demander tous les fichiers dans la même
            # fraction de seconde et donc il faut absorber ce pic.
            # Ensuite les fichiers seront dans le cache du browser et ce pic n'existera plus
            # Mais si on reset le cache alors ce pic va réapparaitre la première fois
            # NB: la plupart de ces fichiers sont des JS/CSS/Images. Donc on augemnte le burst
            # Aucun risque de saturation de server car ces fichiers ne génèrent pas d'échanges supplémentaires
            # ~ pour dire que c'est du regex; * insensible à majuscule/minuscule; ^ qui commence par /airflow/static/
            # . n'importe quel caractère; * répété 0, 1 ou plusieurs fois;
            # $: la chaine de caractère s'arrête une fois arrivé à la fin de l'url
            location ~* ^/airflow/static/.*$ {
                limit_req zone=apilimit burst=100 nodelay;
                proxy_pass http://airflow-webserver:8080;
            }
        }


        location = /flower {
            # Le code 301 indique une redirection permanente vers la version avec slash.
            return 301 $scheme://$http_host$request_uri/;
        }

        location /flower/ {
            # Même explication que pour/mlflow/
            limit_req zone=apilimit burst=20 nodelay;

            # --- SUPPORT TEMPS RÉEL (WebSockets) ---
            # Upgrade et Connection nécessaires pour voir l'état
            # des tâches (ex: rouge -> vert) sans rafraîchir la page.
            # Le protocole WebSocket exige HTTP 1.1 et l'en-tête Upgrade.
            # NB: par défaut, Nginx est en HTTP 1.0
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Dans docker-compose, pour le service airflow-flower, j'ai FLOWER_URL_PREFIX: flower
            # Ainsi flower s'attend à recevoir de le format http://airflow-flower:5555/flower/...
            proxy_pass http://airflow-flower:5555;
        }

        # PROMETHEUS&GRAFANA
        location = /prometheus {
            # Le code 301 indique une redirection permanente vers la version avec slash.
            return 301 $scheme://$http_host$request_uri/;
        }

        location /prometheus/ {
            # Même explication que pour/mlflow/
            limit_req zone=apilimit burst=20 nodelay;

            # Dans le docker-compose.yml, '--web.route-prefix=/prometheus' indique de garder
            # le /prometheus pour que nginx puisse le gérer correctement
            # Donc pas de / à la fin du proxy_pass ainsi on aura le format http://prometheus:9090/prometheus/
            proxy_pass http://prometheus:9090;

            # proxy_redirect corrige à la volée les redirections 302
            # que Prometheus génère parfois en HTTP. scheme est le http ou https utisé
            # sur l'interface web
            # proxy_redirect http:// $scheme://;
            proxy_redirect off;
        }

        # PROMETHEUS&GRAFANA
        location = /grafana {
            # Le code 301 indique une redirection permanente vers la version avec slash.
            return 301 $scheme://$http_host$request_uri/;
        }

        location /grafana/ {
            # Même explication que pour/mlflow/
            limit_req zone=apilimit burst=20 nodelay;

            # Dans le docker-compose.yml, 'GF_SERVER_ROOT_URL=${NGINX_PROTOCOL}://${PROJECT_IP}/grafana/'
            # indique de garder le /grafana/ pour que nginx puisse le gérer correctement.
            # Et GF_SERVER_SERVE_FROM_SUB_PATH=true force Grafana à écouter sur ce sous-chemin.
            # Donc pas de / à la fin du proxy_pass ainsi on aura le format http://grafana:3000/grafana/
            proxy_pass http://grafana:3000;
        }

        #location /predict {
        #    proxy_pass http://prediction_api:8000/predict;
        #}

        #location /api/docs {
        #    proxy_pass http://prediction_api:8000/docs;
        #}

        # JSON indispensable pour que la doc s'affiche
        #location /openapi.json {
        #    proxy_pass http://prediction_api:8000/openapi.json;
        #}

        # Redirection vers XXX (Futur)
        # avec XXX = airflow, grafana, prometheus, evidently
        # et respectivement pour yyyy = 8080, 3000, 9090, 8000
        #location /XXX {
        #    proxy_pass http://XXX:yyyy/;
        #}

        # Cas où la commande est inconnue
        location / {
            add_header Content-Type application/json;
            return 404 '{"ERREUR - MAUVAISE ADRESSE INSERÉE": "FORMATS: http://@IP/api/ ou http://@IP/mlflow/ ou http://@IP/api/docs"}';
        }
    }
}
