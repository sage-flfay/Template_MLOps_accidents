# setup.cfg (version ed01) à la racine Template_MLOps_accidents

[flake8]
max-line-length = 88

# E203: Whitespace before ':' (Conflit avec Black). Espacement autorisé par Black pour plus de lisibilité (ex: [1 : 2])
# W503: Line break before binary operator (Conflit avec Black). Opérateur mis au début de la ligne améliore la lisibilité
# E226: Missing whitespace around arithmetic operator (Conflit avec Black uniquement pour la partie print). Black considère que cet espacement est inutile dans le print
ignore = E203, W503, E226