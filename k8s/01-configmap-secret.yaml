# ============================================================
# ConfigMap : toutes les variables d'environnement non-sensibles
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: accidents-severity
data:
  # --- MLflow ---
  MLFLOW_TRACKING_URI: "http://mlflow-service:5000"
  MLFLOW_HTTP_REQUEST_TIMEOUT: "60"
  # MLflow utilise la base "mlflow" sur le Postgres partagé
  DATABASE_URL: "postgresql://airflow:airflow@postgres-service:5432/mlflow"

  # --- Train / API ---
  UV_LINK_MODE: "copy"
  GIT_PYTHON_REFRESH: "quiet"

  # --- Airflow (LocalExecutor — pas de Redis) ---
  AIRFLOW__CORE__EXECUTOR: "LocalExecutor"
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
  AIRFLOW__CORE__HOSTNAME_CALLABLE: "socket.gethostname"
  # Fernet key fixe — acceptable pour un exercice
  # En prod : générer avec python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  AIRFLOW__CORE__FERNET_KEY: "81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs="
  # Airflow utilise la base "airflow" sur le Postgres partagé
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:airflow@postgres-service:5432/airflow"
  AIRFLOW__CORE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:airflow@postgres-service:5432/airflow"
  AIRFLOW__WEBSERVER__BASE_URL: "http://localhost/airflow"
  AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "true"
  AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
  MLFLOW_EXPERIMENT_NAME: "accidents_severity"
  _AIRFLOW_WWW_USER_USERNAME: "admin"
  _AIRFLOW_WWW_USER_PASSWORD: "admin"

---
# ============================================================
# Secret : identifiants Postgres
# echo -n "airflow" | base64 → YWlyZmxvdw==
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: accidents-severity
type: Opaque
data:
  POSTGRES_USER: YWlyZmxvdw==      # airflow
  POSTGRES_PASSWORD: YWlyZmxvdw==  # airflow
  POSTGRES_DB: YWlyZmxvdw==        # airflow (base par défaut — mlflow créée au démarrage)

---
# ============================================================
# Secret : identifiants DagsHub (DVC remote S3)
# Créer manuellement sans commiter les valeurs :
#   kubectl create secret generic dagshub-secret \
#     --from-literal=DAGSHUB_ACCESS_KEY_ID=<key> \
#     --from-literal=DAGSHUB_SECRET_ACCESS_KEY=<secret> \
#     -n accidents-severity
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: dagshub-secret
  namespace: accidents-severity
type: Opaque
data:
  DAGSHUB_ACCESS_KEY_ID: ""      # echo -n "votre_key" | base64
  DAGSHUB_SECRET_ACCESS_KEY: ""  # echo -n "votre_secret" | base64

---
# ============================================================
# Secret : Grafana admin
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: accidents-severity
type: Opaque
data:
  GF_SECURITY_ADMIN_USER: YWRtaW4=      # admin
  GF_SECURITY_ADMIN_PASSWORD: YWRtaW4=  # admin
