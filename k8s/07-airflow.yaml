# ============================================================
# Airflow : RBAC + Deployment + Service
#
# LocalExecutor : pas de Redis, pas de Worker, pas de Flower.
# Webserver et Scheduler dans le même pod pour économiser les ressources.
#
# L'initContainer airflow-init gère automatiquement :
#   - airflow db migrate
#   - création user admin
#   - connexion postgres_default (plus besoin de le faire dans l'UI)
#   - variable TRAIN_YEAR=2019   (plus besoin de le faire dans l'UI)
# ============================================================

# --- RBAC ---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: airflow-sa
  namespace: accidents-severity

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: airflow-role
  namespace: accidents-severity
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: airflow-role-binding
  namespace: accidents-severity
subjects:
  - kind: ServiceAccount
    name: airflow-sa
    namespace: accidents-severity
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: airflow-role

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow
  namespace: accidents-severity
  labels:
    app: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow
  template:
    metadata:
      labels:
        app: airflow
    spec:
      serviceAccountName: airflow-sa
      initContainers:
        # 1. Attendre Postgres
        - name: wait-for-postgres
          image: localhost:8081/busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "until nc -z postgres-service 5432; do echo 'Attente Postgres...'; sleep 3; done"]

        # 2. Init complet Airflow — tout automatisé, aucune action manuelle requise
        - name: airflow-init
          image: localhost:8081/accidents_severity-airflow:1.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              # --- Migration base de données ---
              airflow db migrate

              # --- User admin (|| true : pas d'erreur si déjà existant) ---
              airflow users create \
                --username admin \
                --firstname Admin \
                --lastname Admin \
                --role Admin \
                --email admin@example.com \
                --password admin || true

              # --- Connexion Postgres ---
              # Équivalent manuel : Airflow UI > Admin > Connections > postgres_default
              # conn-uri format : postgresql://user:password@host:port/schema
              airflow connections add postgres_default \
                --conn-type postgres \
                --conn-host postgres-service \
                --conn-schema airflow \
                --conn-login airflow \
                --conn-password airflow \
                --conn-port 5432 || true

              # --- Variable TRAIN_YEAR ---
              # Équivalent manuel : Airflow UI > Admin > Variables > TRAIN_YEAR
              # Équivalent Makefile : docker compose run airflow-worker airflow variables set TRAIN_YEAR 2019
              airflow variables set TRAIN_YEAR 2019 || true

              echo "Airflow initialisé (DB + user + connexion Postgres + TRAIN_YEAR)"
          envFrom:
            - configMapRef:
                name: app-config
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
            - name: logs
              mountPath: /opt/airflow/logs

      containers:
        # Scheduler
        - name: scheduler
          image: localhost:8081/accidents_severity-airflow:1.0
          imagePullPolicy: IfNotPresent
          command: ["airflow", "scheduler"]
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: MLFLOW_TRACKING_URI        
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MLFLOW_TRACKING_URI
            - name: MLFLOW_EXPERIMENT_NAME     
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MLFLOW_EXPERIMENT_NAME          
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
            - name: logs
              mountPath: /opt/airflow/logs
            - name: artifacts
              mountPath: /app/artifacts
          

        # Webserver
        - name: webserver
          image: localhost:8081/accidents_severity-airflow:1.0
          imagePullPolicy: IfNotPresent
          command: ["airflow", "webserver"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
            - name: logs
              mountPath: /opt/airflow/logs
          readinessProbe:
            httpGet:
              path: /airflow/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /airflow/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 20

      volumes:
        - name: dags
          persistentVolumeClaim:
            claimName: airflow-dags-pvc
        - name: logs
          emptyDir: {}
        - name: artifacts
          persistentVolumeClaim:
            claimName: mlflow-artifacts-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: airflow-service
  namespace: accidents-severity
  labels:
    app: airflow
spec:
  selector:
    app: airflow
  ports:
    - port: 8080
      targetPort: 8080
