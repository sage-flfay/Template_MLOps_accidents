# ============================================================
# IngressRoute Traefik (natif k3s)
#
# Routes :
#   /api        → api-service:8000        (FastAPI)
#   /mlflow     → mlflow-service:5000     (MLflow UI)
#   /airflow    → airflow-service:8080    (Airflow UI)
#   /grafana    → grafana-service:3000    (Grafana)
#   /prometheus → prometheus-service:9090 (Prometheus UI)
#
#
# Accès :
#   http://<IP_VM>/api/docs
#   http://<IP_VM>/api
#   http://<IP_VM>/mlflow
#   http://<IP_VM>/airflow
#   http://<IP_VM>/grafana
#   http://<IP_VM>/prometheus
# ============================================================

# --- Middlewares strip-prefix ---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api
  namespace: accidents-severity
spec:
  stripPrefix:
    prefixes: ["/api"]

---

# Airflow et Grafana gèrent leur sous-chemin nativement
# (AIRFLOW__WEBSERVER__BASE_URL et GF_SERVER_SERVE_FROM_SUB_PATH)
# → pas de strip-prefix pour eux

# --- IngressRoute HTTP ---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: accidents-severity-http
  namespace: accidents-severity
spec:
  entryPoints:
    - web
  routes:
    # FastAPI
    - match: PathPrefix(`/api`)
      kind: Rule
      middlewares:
        - name: strip-api
          namespace: accidents-severity
      services:
        - name: api-service
          port: 8000

    # MLflow UI
    - match: PathPrefix(`/mlflow`)
      kind: Rule      
      services:
        - name: mlflow-service
          port: 5000    

    # Airflow (gère /airflow nativement)
    - match: PathPrefix(`/airflow`)
      kind: Rule
      services:
        - name: airflow-service
          port: 8080

    # Grafana (gère /grafana nativement)
    - match: PathPrefix(`/grafana`)
      kind: Rule
      services:
        - name: grafana-service
          port: 3000

    # Prometheus
    - match: PathPrefix(`/prometheus`)
      kind: Rule      
      services:
        - name: prometheus-service
          port: 9090

---
