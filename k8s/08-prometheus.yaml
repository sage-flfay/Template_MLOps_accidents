# ============================================================
# Prometheus : ConfigMap + RBAC + Deployment + Service
# node-exporter : DaemonSet (métriques VM)
#
# Équivalent des services docker-compose :
#   prometheus + node-exporter (cAdvisor supprimé — trop lourd)
# ============================================================

# --- ConfigMap : prometheus.yml ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: accidents-severity
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      # --- API FastAPI (/metrics via prometheus-fastapi-instrumentator) ---
      - job_name: 'fastapi'
        static_configs:
          - targets: ['api-service:8000']
        metrics_path: /metrics      

      # --- Node Exporter (métriques VM : CPU, RAM, disk) ---
      - job_name: 'node-exporter'
        static_configs:
          - targets: ['node-exporter-service:9100']

      # --- Autodiscovery pods annotés ---
      # Ajouter sur un pod :
      #   annotations:
      #     prometheus.io/scrape: "true"
      #     prometheus.io/port: "8000"
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['accidents-severity']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

---
# --- RBAC Prometheus ---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-sa
  namespace: accidents-severity

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-cluster-role
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-cluster-role-binding
subjects:
  - kind: ServiceAccount
    name: prometheus-sa
    namespace: accidents-severity
roleRef:
  kind: ClusterRole
  name: prometheus-cluster-role
  apiGroup: rbac.authorization.k8s.io

---
# --- Deployment Prometheus ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: accidents-severity
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus-sa
      containers:
        - name: prometheus
          image: localhost:8081/prom/prometheus:v2.51.2
          imagePullPolicy: IfNotPresent
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=15d"
            - "--web.route-prefix=/prometheus"
            - "--web.external-url=http://localhost/prometheus/"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /prometheus/-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /prometheus/-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: accidents-severity
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090

---
# ============================================================
# Node Exporter : DaemonSet
# Un pod par nœud (sur k3s 1 seul nœud donc 1 pod)
# Métriques VM : CPU, RAM, disk, réseau
# Équivalent du service node-exporter du docker-compose
# ============================================================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: accidents-severity
  labels:
    app: node-exporter
spec:
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
    spec:
      hostNetwork: true    # accès aux interfaces réseau de la VM
      hostPID: true        # accès aux processus de la VM
      containers:
        - name: node-exporter
          image: localhost:8081/prom/node-exporter:v1.8.2
          imagePullPolicy: IfNotPresent
          args:
            - "--path.procfs=/host/proc"
            - "--path.sysfs=/host/sys"
            - "--path.rootfs=/rootfs"
            - "--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/run/docker/netns/.+)$"
          ports:
            - containerPort: 9100
              hostPort: 9100
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
            - name: rootfs
              mountPath: /rootfs
              readOnly: true
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: rootfs
          hostPath:
            path: /

---
apiVersion: v1
kind: Service
metadata:
  name: node-exporter-service
  namespace: accidents-severity
  labels:
    app: node-exporter
spec:
  selector:
    app: node-exporter
  ports:
    - port: 9100
      targetPort: 9100
