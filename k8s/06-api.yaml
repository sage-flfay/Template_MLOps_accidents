# ============================================================
# API FastAPI : Deployment + Service
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: accidents-severity
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
      annotations:
        # Autodiscovery Prometheus — scrape /metrics si prometheus-fastapi-instrumentator installé
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
        - name: wait-for-mlflow
          image: localhost:8081/busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "until nc -z mlflow-service 5000; do echo 'Attente MLflow...'; sleep 3; done"]
      containers:
        - name: api
          image: localhost:8081/accidents_severity-api:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MLFLOW_TRACKING_URI
            - name: UV_LINK_MODE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: UV_LINK_MODE
            - name: GIT_PYTHON_REFRESH
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: GIT_PYTHON_REFRESH
          volumeMounts:
            - name: artifacts
              mountPath: /app/artifacts
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: mlflow-artifacts-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: accidents-severity
  labels:
    app: api
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
