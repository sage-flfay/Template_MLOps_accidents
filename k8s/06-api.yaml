apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: accidents-severity
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: wait-for-mlflow
          image: localhost:5000/busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "until nc -z mlflow-service 5000; do echo 'Attente MLflow...'; sleep 3; done"]
      containers:
        - name: api
          image: localhost:5000/accidents_severity-api:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: accidents-severity-config
          volumeMounts:
            - name: mlflow-artifacts
              mountPath: /app/artifacts
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: mlflow-artifacts
          persistentVolumeClaim:
            claimName: mlflow-artifacts-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: accidents-severity
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000