apiVersion: batch/v1
kind: Job
metadata:
  name: training-job
  namespace: accidents-severity
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: train
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-mlflow
          image: localhost:5000/busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "until nc -z mlflow-service 5000; do echo 'Attente MLflow...'; sleep 3; done"]
      containers:
        - name: train
          image: localhost:5000/accidents_severity-train:1.0
          imagePullPolicy: IfNotPresent          
          volumeMounts:
            - name: mlflow-artifacts
              mountPath: /app/artifacts
          envFrom:
            - configMapRef:
                name: accidents-severity-config
            - secretRef:
                name: dagshub-secret   
          env:      
            - name: MLFLOW_TRACKING_URI     # depuis ConfigMap
            - name: UV_LINK_MODE            # depuis ConfigMap
            - name: GIT_PYTHON_REFRESH      # depuis ConfigMap
            - name: AWS_ACCESS_KEY_ID       # ← depuis dagshub-secret (DAGSHUB_ACCESS_KEY_ID)
            - name: AWS_SECRET_ACCESS_KEY   # ← depuis dagshub-secret (DAGSHUB_SECRET_ACCESS_KEY)                
      volumes:
        - name: mlflow-artifacts
          persistentVolumeClaim:
            claimName: mlflow-artifacts-pvc
            