apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: accidents-severity
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      initContainers:
        - name: wait-for-postgres
          image: localhost:5000/busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "until nc -z postgres-service 5432; do echo 'Attente Postgres...'; sleep 2; done"]
      containers:
        - name: mlflow
          image: localhost:5000/accidents_severity-mlflow:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: MLFLOW_HTTP_REQUEST_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: accidents-severity-config
                  key: MLFLOW_HTTP_REQUEST_TIMEOUT
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: accidents-severity-config
                  key: DATABASE_URL
          volumeMounts:
            - name: mlflow-artifacts
              mountPath: /app/artifacts
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: mlflow-artifacts
          persistentVolumeClaim:
            claimName: mlflow-artifacts-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-service
  namespace: accidents-severity
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000