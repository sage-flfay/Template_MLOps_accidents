# ============================================================
# Ingress Traefik — IngressRoute (CRD native k3s)
#
# ============================================================

# ------------------------------------------------------------
# Middleware : supprime le préfixe /api avant transmission
# /api/health  →  /health   transmis à api-service:8000
# /api/docs    →  /docs     transmis à api-service:8000
# ------------------------------------------------------------
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api
  namespace: accidents-severity
spec:
  stripPrefix:
    prefixes:
      - /api

---
# ------------------------------------------------------------
# Middleware : supprime le préfixe /mlflow avant transmission
# /mlflow/     →  /         transmis à mlflow-service:5000
# /mlflow/runs →  /runs     transmis à mlflow-service:5000
# ------------------------------------------------------------
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-mlflow
  namespace: accidents-severity
spec:
  stripPrefix:
    prefixes:
      - /mlflow

---
# ------------------------------------------------------------
# IngressRoute HTTP (port 80)
# ------------------------------------------------------------
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: accidents-severity-http
  namespace: accidents-severity
spec:
  entryPoints:
    - web          # entrypoint HTTP port 80 natif k3s
  routes:
    # --- API FastAPI ---
    - match: PathPrefix(`/api`)
      kind: Rule
      middlewares:
        - name: strip-api
      services:
        - name: api-service
          port: 8000
    # --- MLflow UI ---
    - match: PathPrefix(`/mlflow`)
      kind: Rule
      middlewares:
        - name: strip-mlflow
      services:
        - name: mlflow-service
          port: 5000
        
 

---
