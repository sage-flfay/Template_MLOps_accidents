# ============================================================
# PersistentVolumeClaims — local-path provisioner (natif k3s)
# Stockage dans /var/lib/rancher/k3s/storage/ sur la VM
# ============================================================

# Postgres (partagé Airflow + MLflow)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: accidents-severity
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 3Gi

---
