# dvc.yaml (version ed01) à la racine Template_MLOps_accidents

# NB: le "dvc add XXX/YYY.." est implicitement fait dans tous les outs
# stages, deps, outs sont des mots clés

stages:
  import:
    cmd: uv run python src/data/import_raw_data.py data/raw
    outs:
      - data/raw

  process:
    cmd: uv run python src/data/make_dataset.py data/raw data/preprocessed
    deps:
      - data/raw
      - src/data/make_dataset.py
    outs:
      - data/preprocessed/X_train.csv
      - data/preprocessed/X_test.csv
      - data/preprocessed/y_train.csv
      - data/preprocessed/y_test.csv

  train:
    cmd: uv run python src/models/train_model.py data/preprocessed models/model.joblib
    deps:
      - data/preprocessed/X_train.csv
      - data/preprocessed/y_train.csv
      - src/models/train_model.py
    outs:
      - models/model.joblib

  evaluate:
    cmd: uv run python src/models/evaluate_model.py models/model.joblib data/preprocessed metrics.json
    deps:
      - models/model.joblib
      - data/preprocessed/X_test.csv
      - data/preprocessed/y_test.csv
      - src/models/evaluate_model.py

    # cache: false ==> ne pas le mettre dans .dvc/cache
    # On veut le voir dans le github, donc faire git add metrics.json
    metrics:
      - metrics.json:
          cache: false