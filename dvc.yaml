# dvc.yaml (version ed01) à la racine Template_MLOps_accidents

# NB: le "dvc add XXX/YYY.." est implicitement fait dans tous les outs
# stages, deps, outs sont des mots clés

stages:
  import: 
    cmd: uv run --active python src/data/import_raw_data.py data/raw
    outs:
      - data/raw

  process:
    cmd: uv run --active python src/data/make_dataset.py data/raw data/preprocessed
    deps:
      - data/raw
      - src/data/make_dataset.py
    outs:
      - data/preprocessed/X_train.csv
      - data/preprocessed/X_test.csv
      - data/preprocessed/y_train.csv
      - data/preprocessed/y_test.csv

  train:
    #cmd: uv run --active python -m src.models.train_model data/preprocessed models/model.joblib
    cmd: uv run --active python -m src.models.train_model --train_path data/preprocessed --model_output models/model.joblib
    deps:
      - data/preprocessed/X_train.csv
      - data/preprocessed/y_train.csv
      - src/models/train_model.py
    outs:
      - models/model.joblib

  evaluate:
    cmd: uv run --active python -m src.models.evaluate_model models/model.joblib data/preprocessed metrics.json
    deps:
      - models/model.joblib
      - data/preprocessed/X_test.csv
      - data/preprocessed/y_test.csv
      - src/models/evaluate_model.py
    # ===================================================================
    # CORRECTION : Le bloc metrics doit être rattaché à evaluate
    # car c'est ce stage qui produit le fichier metrics.json
    # ===================================================================
    metrics:
      - metrics.json:
          cache: false

  # ===================================================================
  # Déclenchement du predict_model (peut-être pas important)
  # ===================================================================
  predict:
    cmd: uv run --active python -m src.models.predict_model src/models/test_features.json
    deps:
      - models/model.joblib
      - src/models/predict_model.py
      - src/models/test_features.json